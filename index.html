<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">汪聪 | 学术主页</title>
  <meta name="description" content="汪聪的个人学术主页" data-i18n-content="meta_description" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="page">
    <div class="lang-switch-wrap">
      <button id="lang-toggle" class="lang-toggle" type="button">English</button>
    </div>

    <div class="intro">
      <div class="photo-wrap">
        <img src="assets/images/个人证件照.JPG" alt="汪聪" class="photo" />
      </div>
      <div class="bio">
        <h1 data-i18n="name">汪聪</h1>
        <p>
          <span data-i18n="position_line_1">博士研究生（信息与通信工程）</span><br />
          <span data-i18n="position_line_2">上海交通大学（2026.09 - 至今）</span>
        </p>
        <p data-i18n="bio_short">2004.05.25 出生，江西人。</p>
        <p>
          <a href="#education" data-i18n="nav_education">教育经历</a> &nbsp;/&nbsp;
          <a href="#research" data-i18n="nav_research">研究方向</a> &nbsp;/&nbsp;
          <a href="#publications" data-i18n="nav_publications">论文</a> &nbsp;/&nbsp;
          <a href="https://github.com/txyltop" target="_blank" rel="noopener noreferrer">GitHub</a>
        </p>
      </div>
    </div>

    <div class="section" id="education">
      <h2 data-i18n="education_title">教育经历</h2>
      <p>
        <strong data-i18n="edu_1">上海交通大学，信息与通信工程，博士在读（2026.09 - 至今）</strong><br />
        <strong data-i18n="edu_2">吉林大学，电子信息工程，本科（2022.09 - 2026.07）</strong>
      </p>
    </div>

    <div class="section" id="research">
      <h2 data-i18n="research_title">研究方向</h2>
      <p data-i18n="research_text">大模型/智能体在光通信垂直领域的应用。</p>
    </div>

    <div class="section" id="publications">
      <h2 data-i18n="pub_title">论文</h2>
      <ul>
        <li>
          <span data-i18n="pub_1">SCL_LLM</span>
          [<a href="assets/pdf/SCL_LLM.pdf" target="_blank" rel="noopener noreferrer">PDF</a>]
        </li>
      </ul>
    </div>

    <div class="footer" data-i18n="footer">Last updated: April 17, 2026</div>
  </div>

  <script>
    (function () {
      var i18n = {
        zh: {
          title: "汪聪 | 学术主页",
          meta_description: "汪聪的个人学术主页",
          name: "汪聪",
          position_line_1: "博士研究生（信息与通信工程）",
          position_line_2: "上海交通大学（2026.09 - 至今）",
          bio_short: "2004.05.25 出生，江西人。",
          nav_education: "教育经历",
          nav_research: "研究方向",
          nav_publications: "论文",
          education_title: "教育经历",
          edu_1: "上海交通大学，信息与通信工程，博士在读（2026.09 - 至今）",
          edu_2: "吉林大学，电子信息工程，本科（2022.09 - 2026.07）",
          research_title: "研究方向",
          research_text: "大模型/智能体在光通信垂直领域的应用。",
          pub_title: "论文",
          pub_1: "SCL_LLM",
          footer: "最后更新：2026年4月17日"
        },
        en: {
          title: "Wang Cong | Academic Homepage",
          meta_description: "Wang Cong's academic homepage",
          name: "Wang Cong",
          position_line_1: "PhD Student (Information and Communication Engineering)",
          position_line_2: "Shanghai Jiao Tong University (Sep 2026 - Present)",
          bio_short: "Born on May 25, 2004. From Jiangxi, China.",
          nav_education: "Education",
          nav_research: "Research",
          nav_publications: "Publications",
          education_title: "Education",
          edu_1: "Shanghai Jiao Tong University, Information and Communication Engineering, PhD Student (Sep 2026 - Present)",
          edu_2: "Jilin University, Electronic Information Engineering, B.Eng. (Sep 2022 - Jul 2026)",
          research_title: "Research Interests",
          research_text: "Applications of large models and intelligent agents in the optical communication domain.",
          pub_title: "Publications",
          pub_1: "SCL_LLM",
          footer: "Last updated: April 17, 2026"
        }
      };

      var root = document.documentElement;
      var btn = document.getElementById("lang-toggle");
      var saved = localStorage.getItem("site_lang");
      var lang = saved === "en" ? "en" : "zh";

      function applyLang(nextLang) {
        var dict = i18n[nextLang];
        root.setAttribute("lang", nextLang === "zh" ? "zh-CN" : "en");

        var textNodes = document.querySelectorAll("[data-i18n]");
        for (var i = 0; i < textNodes.length; i++) {
          var key = textNodes[i].getAttribute("data-i18n");
          if (dict[key]) {
            textNodes[i].textContent = dict[key];
          }
        }

        var metaNodes = document.querySelectorAll("[data-i18n-content]");
        for (var j = 0; j < metaNodes.length; j++) {
          var metaKey = metaNodes[j].getAttribute("data-i18n-content");
          if (dict[metaKey]) {
            metaNodes[j].setAttribute("content", dict[metaKey]);
          }
        }

        btn.textContent = nextLang === "zh" ? "English" : "中文";
        localStorage.setItem("site_lang", nextLang);
        lang = nextLang;
      }

      btn.addEventListener("click", function () {
        applyLang(lang === "zh" ? "en" : "zh");
      });

      applyLang(lang);
    })();
  </script>
</body>
</html>
